name: Sync to Hugging Face hub
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Inline the token seamlessly into Git's credential store for huggingface.co
          git config --global credential.https://huggingface.co.username "M7md-al7aris"
          git config --global credential.https://huggingface.co.helper "!f() { echo password=$HF_TOKEN; }; f"
          
          # 2. Add the clean URL
          git remote add space https://huggingface.co/spaces/M7md-al7aris/demo1
          
          # 3. Safely push without any credential prompt triggers
          git push --force space main