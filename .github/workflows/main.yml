name: Sync to Hugging Face hub
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git Credentials & Push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Set up the remote target URL cleanly
          git remote add space https://huggingface.co/spaces/M7md-al7aris/demo1
          
          # 2. Tell git to use your HF_TOKEN as the authorization header bearer token
          git config --global http.https://huggingface.co/.extraheader "Authorization: Bearer $HF_TOKEN"
          
          # 3. Push safely
          git push --force space main